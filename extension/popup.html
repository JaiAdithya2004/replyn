<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 300px;
      margin: 0;
      padding: 16px;
      font-family: "Google Sans", Roboto, Arial, sans-serif;
      color: #202124;
      background: #fff;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    p.sub { font-size: 12px; color: #5f6368; margin: 0 0 14px; }
    label { display: block; font-size: 12px; font-weight: 600; margin: 12px 0 4px; }
    input, select {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      font-size: 13px;
      border: 1px solid #dadce0;
      border-radius: 6px;
    }
    button {
      margin-top: 16px;
      width: 100%;
      padding: 9px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(90deg, #7b2ff7 0%, #4a6cf7 100%);
      border: none;
      border-radius: 18px;
      cursor: pointer;
    }
    button.secondary {
      background: #f1f3f4;
      color: #202124;
      margin-top: 8px;
    }
    #status {
      margin-top: 12px;
      font-size: 12px;
      padding: 8px;
      border-radius: 6px;
      display: none;
    }
    #status.ok { display: block; background: #e6f4ea; color: #137333; }
    #status.err { display: block; background: #fce8e6; color: #c5221f; }
    .saved { font-size: 12px; color: #137333; margin-top: 8px; display: none; }
  </style>
</head>
<body>
  <h1>✨ Replyn</h1>
  <p class="sub">AI support replies inside Gmail, grounded in your past answers.</p>

  <label for="backendUrl">Backend URL</label>
  <input id="backendUrl" type="text" placeholder="http://127.0.0.1:8000" />

  <label for="tone">Reply tone</label>
  <select id="tone">
    <option value="friendly">Friendly</option>
    <option value="formal">Formal</option>
    <option value="concise">Concise</option>
    <option value="empathetic">Empathetic</option>
  </select>

  <button id="save">Save settings</button>
  <button id="test" class="secondary">Test backend connection</button>

  <div class="saved" id="saved">Settings saved ✓</div>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
